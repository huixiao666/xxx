<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站大全</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4d6d;
            --primary-light: #ff8fa3;
            --accent: #4cc9f0;
            --green: #2ecc71;
            --bg: #fff5f7;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-muted: #888;
            --border: #f0e0e5;
            --tab-active: #ff4d6d;
            --shadow: 0 2px 12px rgba(255, 77, 109, 0.08);
            --iframe-bg: #ffffff;
        }

        [data-theme="dark"] {
            --primary: #ff6b81;
            --primary-light: #ff8fa3;
            --accent: #4cc9f0;
            --green: #2ecc71;
            --bg: #111111;
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
            --text-muted: #999;
            --border: #2a2a2a;
            --tab-active: #ff6b81;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            --iframe-bg: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: #fff;
            padding: 16px 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 0 var(--border);
        }
        [data-theme="dark"] .header {
            background: #1a1a1a;
            box-shadow: 0 1px 0 var(--border);
        }

        .header-title {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f8f0f2;
            border-radius: 24px;
            padding: 8px 16px;
            gap: 8px;
            margin-bottom: 12px;
            border: 1.5px solid var(--border);
        }
        [data-theme="dark"] .search-bar {
            background: #111;
        }
        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text);
            outline: none;
            font-family: inherit;
        }
        [data-theme="dark"] .search-bar input {
            color: #e0e0e0;
        }
        .search-bar .google-logo {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .google-logo span:nth-child(1) {
            color: #4285F4;
        }
        .google-logo span:nth-child(2) {
            color: #EA4335;
        }
        .google-logo span:nth-child(3) {
            color: #FBBC05;
        }
        .google-logo span:nth-child(4) {
            color: #4285F4;
        }
        .google-logo span:nth-child(5) {
            color: #34A853;
        }
        .google-logo span:nth-child(6) {
            color: #EA4335;
        }
        [data-theme="dark"] .google-logo {
            color: #e0e0e0;
        }
        .search-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        [data-theme="dark"] .search-btn {
            background: var(--primary);
            color: #fff;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
        }
        [data-theme="dark"] .tabs {
            border-bottom-color: var(--border);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
        }
        [data-theme="dark"] .tab {
            color: #999;
        }
        .tab.active {
            color: var(--primary);
            font-weight: 700;
        }
        [data-theme="dark"] .tab.active {
            color: var(--primary);
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            width: 60%;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
        }

        .main {
            display: flex;
            max-width: 960px;
            margin: 0 auto;
        }

        .sidebar {
            width: 72px;
            background: #fff;
            min-height: calc(100vh - 120px);
            padding: 8px 0;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
        }
        [data-theme="dark"] .sidebar {
            background: #1a1a1a;
            border-right-color: var(--border);
        }
        .sidebar-item {
            padding: 12px 8px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 0;
        }
        [data-theme="dark"] .sidebar-item {
            color: #999;
        }
        .sidebar-item:hover {
            background: var(--bg);
            color: var(--primary);
        }
        [data-theme="dark"] .sidebar-item:hover {
            background: #111;
        }
        .sidebar-item.active {
            background: #fff0f3;
            color: var(--primary);
            font-weight: 700;
            border-right: 3px solid var(--primary);
        }
        [data-theme="dark"] .sidebar-item.active {
            background: #2a1018;
            border-right-color: var(--primary);
        }

        .content {
            flex: 1;
            padding: 0;
        }

        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }

        .rank-list {
            padding: 8px 0;
        }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        [data-theme="dark"] .rank-item {
            background: #1a1a1a;
            border-bottom-color: var(--border);
        }
        .rank-item:hover {
            background: #fff5f7;
        }
        [data-theme="dark"] .rank-item:hover {
            background: #222;
        }

        .rank-num {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .rank-num.fire-1 {
            background: #ff4d6d;
            color: #fff;
        }
        .rank-num.fire-2 {
            background: #ff8c42;
            color: #fff;
        }
        .rank-num.fire-3 {
            background: #ffd166;
            color: #fff;
        }
        .rank-num.normal {
            background: #f0e8ea;
            color: #888;
        }
        [data-theme="dark"] .rank-num.normal {
            background: #2a2a2a;
            color: #999;
        }

        .rank-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
        }
        .rank-info {
            flex: 1;
            min-width: 0;
        }
        .rank-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        [data-theme="dark"] .rank-name {
            color: #e0e0e0;
        }
        .rank-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        [data-theme="dark"] .rank-desc {
            color: #999;
        }

        .app-list {
            padding: 8px 0;
            background: var(--bg);
        }
        [data-theme="dark"] .app-list {
            background: transparent;
        }
        .app-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        [data-theme="dark"] .app-item {
            background: #1a1a1a;
            border-bottom-color: var(--border);
        }
        .app-item:hover {
            background: #fff5f7;
        }
        [data-theme="dark"] .app-item:hover {
            background: #222;
        }
        .app-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            overflow: hidden;
        }
        .app-info {
            flex: 1;
            min-width: 0;
        }
        .app-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        [data-theme="dark"] .app-name {
            color: #e0e0e0;
        }
        .badge {
            font-size: 10px;
            background: #ff4d6d;
            color: #fff;
            border-radius: 4px;
            padding: 1px 5px;
            font-weight: 500;
        }
        [data-theme="dark"] .badge {
            color: #fff;
        }
        .app-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-align: left;
        }
        .install-btn {
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 18px;
            padding: 7px 18px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        .install-btn:hover {
            opacity: 0.85;
        }
        .install-btn.open {
            background: #4cc9f0;
        }
        [data-theme="dark"] .install-btn {
            color: #fff;
        }

        .app-search-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px 14px;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 24px;
        }
        [data-theme="dark"] .app-search-wrap {
            background: #1a1a1a;
            border-color: var(--border);
        }
        .app-search-wrap input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: var(--text);
            font-family: inherit;
        }
        [data-theme="dark"] .app-search-wrap input {
            color: #e0e0e0;
        }
        .app-search-wrap input::placeholder {
            color: #aaa;
        }
        .app-search-clear {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 16px;
            display: none;
        }
        [data-theme="dark"] .app-search-clear {
            color: #999;
        }
        .app-search-clear.visible {
            display: block;
        }

        .ai-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }
        [data-theme="dark"] .ai-item {
            background: #1a1a1a;
            border-bottom-color: var(--border);
        }
        .ai-item:hover {
            background: #fff5f7;
        }
        [data-theme="dark"] .ai-item:hover {
            background: #242424;
        }

        @media (max-width: 600px) {
            .sidebar {
                width: 60px;
            }
        }

        [data-theme="dark"] .rank-list {
            background: transparent;
        }
        [data-theme="dark"] .header-title {
            color: #e0e0e0;
        }
        [data-theme="dark"] .rank-icon {
            color: #e0e0e0;
        }
        [data-theme="dark"] .app-icon {
            color: #e0e0e0;
        }
    </style>
</head>
<body>

        </div>
        <div class="search-bar">

                <div id="cat-anime" style="display:none;" class="cat-apps-grid"></div>
                <div id="cat-novel" style="display:none;" class="cat-apps-grid"></div>
                <div id="cat-social" style="display:none;" class="cat-apps-grid"></div>
                <div id="cat-game" style="display:none;" class="cat-apps-grid"></div>

            </div>
        </div>

        <div class="app-list" id="overseasList"></div>
    </div>

    <script>
        // 日夜模式
        (function() {
            let dark = localStorage.getItem('webdir_dark');
            if (dark === null) dark = '1';
            document.documentElement.setAttribute('data-theme', dark === '1' ? 'dark' : '');
            document.getElementById('themeBtn').textContent = dark === '1' ? '☀️' : '🌙';
            document.getElementById('themeBtn').addEventListener('click', function() {
                let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', '');
                    this.textContent = '🌙';
                    localStorage.setItem('webdir_dark', '0');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    this.textContent = '☀️';
                    localStorage.setItem('webdir_dark', '1');
                }
            });
        })();

        function switchMainTab(el, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            var panel = document.getElementById('panel-' + tab);

            let tags = CAT_TAG_MAP[cat] || [];

            if (searchQuery) {
